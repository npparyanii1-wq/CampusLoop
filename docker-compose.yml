version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: campusloop_db
    restart: always
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: campusloop
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campusloop"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campusloop_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_DATABASE=campusloop
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campusloop_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    container_name: campusloop_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@campusloop.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
